<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador de Besos 💕</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 22px 12px 40px;
      background: linear-gradient(160deg, #fde8f0 0%, #ede8fc 50%, #e8f0fd 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(160deg, #3a1a28 0%, #221a3a 50%, #1a2240 100%); }
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      padding: 14px 0 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 12px;
      color: #a06080;
      letter-spacing: 0.02em;
    }
    @media (prefers-color-scheme: dark) { .subtitle { color: #c090b0; } }

    /* Estado de conexión */
    .status-bar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
      transition: all 0.3s ease;
      z-index: 100;
    }
    .status-bar.connecting {
      background: #faeeda;
      color: #854f0b;
    }
    .status-bar.connected {
      background: #eaf3de;
      color: #3b6d11;
    }
    .status-bar.error {
      background: #fcebeb;
      color: #a32d2d;
    }

    /* Título */
    .title-block { text-align: center; margin-bottom: 1.5rem; }
    .title-emoji { font-size: 28px; display: block; margin-bottom: 4px; }
    .title-text {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #b0559a;
      font-weight: 500;
    }
    @media (prefers-color-scheme: dark) { .title-text { color: #e8a0d8; } }

    /* Contador principal */
    .counter-card {
      background: #fff;
      border: 2px solid #f4b8d8;
      border-radius: 24px;
      padding: 1.75rem 3rem;
      text-align: center;
      width: 100%;
      max-width: 340px;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    @media (max-width: 360px) {
      .counter-card { padding: 1.35rem 1.35rem; }
    }
    @media (prefers-color-scheme: dark) {
      .counter-card { background: #2a1220; border-color: #8a3060; }
    }
    .counter-card::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: #fde8f4;
      border-radius: 50%;
      z-index: 0;
    }
    .counter-card::after {
      content: '';
      position: absolute;
      bottom: -20px; left: -20px;
      width: 70px; height: 70px;
      background: #eee8fd;
      border-radius: 50%;
      z-index: 0;
    }
    @media (prefers-color-scheme: dark) {
      .counter-card::before { background: #3a1a2e; }
      .counter-card::after { background: #1e1a3a; }
    }
    .counter-inner { position: relative; z-index: 1; }

    .count-number {
      font-size: clamp(56px, 14vw, 88px);
      font-weight: 500;
      line-height: 1;
      background: linear-gradient(135deg, #e8558a, #9b6cdf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      transition: transform 0.15s ease;
      display: block;
    }
    .count-number.bump { transform: scale(1.18); }
    .count-label {
      font-size: 13px;
      color: #c070a0;
      letter-spacing: 0.08em;
    }
    @media (prefers-color-scheme: dark) { .count-label { color: #d090c0; } }

    .leaderboard {
      margin-top: 12px;
      width: 100%;
      max-width: 260px;
      margin-left: auto;
      margin-right: auto;
    }

    .leader-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: #a06080;
      font-weight: 500;
    }
    @media (prefers-color-scheme: dark) { .leader-row { color: #c090b0; } }

    .leader-left { color: #c03070; }
    .leader-right { color: #6030c0; }
    @media (prefers-color-scheme: dark) {
      .leader-left { color: #f090c0; }
      .leader-right { color: #b090f0; }
    }

    .leader-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(240, 200, 224, 0.9);
      background: linear-gradient(
        90deg,
        rgba(224, 48, 112, 0.75) 0%,
        rgba(224, 48, 112, 0.75) calc(var(--bubuPct, 50) * 1%),
        rgba(96, 48, 192, 0.75) calc(var(--bubuPct, 50) * 1%),
        rgba(96, 48, 192, 0.75) 100%
      );
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
      transition: background 240ms ease;
    }
    @media (prefers-color-scheme: dark) {
      .leader-bar {
        border-color: rgba(106, 40, 72, 0.9);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }
    }

    .leader-winner {
      margin-top: 8px;
      font-size: 11px;
      color: #a06080;
      font-weight: 500;
    }
    @media (prefers-color-scheme: dark) { .leader-winner { color: #c090b0; } }

    .streak {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(240, 200, 224, 0.9);
      background: rgba(255, 255, 255, 0.65);
      color: #854f0b;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .streak.show {
      opacity: 1;
      transform: translateY(0);
    }
    @media (prefers-color-scheme: dark) {
      .streak {
        background: rgba(30, 14, 24, 0.65);
        border-color: rgba(106, 40, 72, 0.9);
        color: #f3c061;
      }
    }

    /* Cards de jugadores */
    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 1.25rem;
    }

    .player-card {
      border-radius: 20px;
      padding: 1.25rem 0.85rem;
      text-align: center;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .player-avatar {
      width: 68px;
      height: 68px;
      margin: 0 auto 10px;
      border-radius: 18px;
      background-image:
        var(--avatar),
        radial-gradient(circle at 30% 20%, #fff 0%, #ffe0ef 35%, #d4c8ff 100%);
      background-size: cover;
      background-position: center;
      border: 2px solid rgba(255, 255, 255, 0.65);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      .player-avatar {
        border-color: rgba(255, 255, 255, 0.12);
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28);
        background-image:
          var(--avatar),
          radial-gradient(circle at 30% 20%, #2a1220 0%, #3a1028 40%, #1e1040 100%);
      }
    }
    .player-card.bubu-card {
      background: linear-gradient(135deg, #ffe0ef, #ffc8e4);
      border-color: #f4a0c8;
    }
    .player-card.dudu-card {
      background: linear-gradient(135deg, #e8e0ff, #d4c8ff);
      border-color: #b89cf0;
    }
    @media (prefers-color-scheme: dark) {
      .player-card.bubu-card { background: linear-gradient(135deg, #3a1028, #501838); border-color: #8a3060; }
      .player-card.dudu-card { background: linear-gradient(135deg, #1e1040, #2a1858); border-color: #6040b0; }
    }

    .player-name {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 2px;
    }
    .player-name.bubu { color: #c03070; }
    .player-name.dudu { color: #6030c0; }
    @media (prefers-color-scheme: dark) {
      .player-name.bubu { color: #f090c0; }
      .player-name.dudu { color: #b090f0; }
    }

    .player-contrib {
      font-size: 12px;
      margin-bottom: 14px;
      color: #a06080;
      font-weight: 500;
    }
    @media (prefers-color-scheme: dark) { .player-contrib { color: #c090b0; } }

    .btn-row { display: flex; gap: 8px; justify-content: center; }

    .btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s ease, filter 0.15s, opacity 0.2s;
      font-size: 20px;
      font-weight: 500;
      line-height: 1;
    }
    .btn:active { transform: scale(0.88); }
    .btn:hover { filter: brightness(1.08); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-kiss-bubu {
      background: linear-gradient(135deg, #f06090, #e03070);
      color: #fff;
      box-shadow: 0 3px 10px #f0609040;
    }
    .btn-minus-bubu { background: #ffd8ec; color: #c03070; }
    @media (prefers-color-scheme: dark) {
      .btn-minus-bubu { background: #501030; color: #f080c0; }
    }

    .btn-kiss-dudu {
      background: linear-gradient(135deg, #9060e0, #6030c0);
      color: #fff;
      box-shadow: 0 3px 10px #9060e040;
    }
    .btn-minus-dudu { background: #ddd0ff; color: #6030c0; }
    @media (prefers-color-scheme: dark) {
      .btn-minus-dudu { background: #28104a; color: #c090f0; }
    }

    /* Historial */
    .log {
      width: 100%;
      max-width: 340px;
      background: #fff8fc;
      border: 1.5px solid #f0c8e0;
      border-radius: 16px;
      padding: 0.9rem 1rem;
      max-height: 130px;
      overflow-y: auto;
    }

    @media (prefers-reduced-motion: reduce) {
      .count-number { transition: none; }
      .leader-bar { transition: none; }
      .streak { transition: none; }
      .fh { animation: none; opacity: 0.85; }
    }
    @media (prefers-color-scheme: dark) {
      .log { background: #1e0e18; border-color: #6a2848; }
    }
    .log-title {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c070a0;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .log-item {
      font-size: 12px;
      padding: 3px 0;
      border-bottom: 0.5px solid #f4d0e8;
      display: flex; align-items: center; gap: 6px;
    }
    @media (prefers-color-scheme: dark) {
      .log-item { border-color: #4a1e38; }
    }
    .log-item:last-child { border-bottom: none; }
    .log-item.log-bubu { color: #c03070; }
    .log-item.log-dudu { color: #6030c0; }
    @media (prefers-color-scheme: dark) {
      .log-item.log-bubu { color: #f090c0; }
      .log-item.log-dudu { color: #b090f0; }
    }
    .log-empty { font-size: 12px; color: #c090b0; font-style: italic; text-align: center; }

    /* Botón reset */
    .reset-btn {
      margin-top: 1rem;
      font-size: 11px;
      color: #c090b0;
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .reset-btn:hover { color: #e03070; }

    /* Corazones flotantes */
    .floating-hearts {
      position: fixed;
      pointer-events: none;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
    }
    .fh {
      position: absolute;
      font-size: 14px;
      opacity: 0;
      animation: floatup 1.2s ease-out forwards;
    }
    @keyframes floatup {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
    }
  </style>
</head>
<body>

<div class="floating-hearts" id="fhearts"></div>

<div id="status-bar" class="status-bar connecting">⏳ Conectando...</div>

<div class="wrap">
  <div class="title-block">
    <span class="title-emoji">💕</span>
    <span class="title-text">Contador de besos</span>
  </div>

  <div class="counter-card">
    <div class="counter-inner">
      <span class="count-number" id="count">0</span>
      <div class="count-label">besitos totales</div>

      <div class="leaderboard" aria-label="Quién va ganando">
        <div class="leader-row">
          <span class="leader-left" id="leader-left">Bubu 50%</span>
          <span class="leader-right" id="leader-right">50% Dudu</span>
        </div>
        <div class="leader-bar" id="leader-bar" role="progressbar" aria-label="Porcentaje de besos de Bubu" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50"></div>
        <div class="leader-winner" id="leader-winner">Empate</div>
      </div>

      <div class="streak" id="streak" aria-live="polite">🔥 Racha x1</div>
    </div>
  </div>

  <div class="players">
    <div class="player-card bubu-card">
      <div class="player-avatar" style="--avatar: url('assets/bubu.jpg');" aria-label="Foto de Bubu" role="img"></div>
      <div class="player-name bubu">BUBU</div>
      <div class="player-contrib" id="bubu-contrib">0 besos</div>
      <div class="btn-row">
        <button class="btn btn-minus-bubu" id="minus-bubu" data-who="bubu" data-delta="-1" title="quitar">−</button>
        <button class="btn btn-kiss-bubu" id="plus-bubu" data-who="bubu" data-delta="1" title="dar beso">
          <svg width="20" height="18" viewBox="0 0 20 18" fill="none">
            <path d="M10 17C10 17 1 10.5 1 5C1 2.8 2.9 1 5.5 1C7.5 1 9 2.2 10 3.6C11 2.2 12.5 1 14.5 1C17.1 1 19 2.8 19 5C19 10.5 10 17 10 17Z" fill="white"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="player-card dudu-card">
      <div class="player-avatar" style="--avatar: url('assets/dudu.jpg');" aria-label="Foto de Dudu" role="img"></div>
      <div class="player-name dudu">DUDU</div>
      <div class="player-contrib" id="dudu-contrib">0 besos</div>
      <div class="btn-row">
        <button class="btn btn-minus-dudu" id="minus-dudu" data-who="dudu" data-delta="-1" title="quitar">−</button>
        <button class="btn btn-kiss-dudu" id="plus-dudu" data-who="dudu" data-delta="1" title="dar beso">
          <svg width="20" height="18" viewBox="0 0 20 18" fill="none">
            <path d="M10 17C10 17 1 10.5 1 5C1 2.8 2.9 1 5.5 1C7.5 1 9 2.2 10 3.6C11 2.2 12.5 1 14.5 1C17.1 1 19 2.8 19 5C19 10.5 10 17 10 17Z" fill="white"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="log">
    <div class="log-title">Historial de besitos</div>
    <div id="log-list"><p class="log-empty">Aún no hay besos... ¡dense uno!</p></div>
  </div>

  <button class="reset-btn" onclick="resetAll()">reiniciar contador</button>
</div>

<script>
  // ============================================================
  // 🔥 REEMPLAZA ESTO CON TU CONFIGURACIÓN DE FIREBASE
  // La encuentras en: Project Settings → Your apps → SDK setup
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyDnuz1g87uSDA9TvMEICDYJaVCbZ65Rj48",
    authDomain: "contador-besos.firebaseapp.com",
    databaseURL: "https://contador-besos-default-rtdb.firebaseio.com",
    projectId: "contador-besos",
    storageBucket: "contador-besos.firebasestorage.app",
    messagingSenderId: "39130427986",
    appId: "1:39130427986:web:b60b13963439bb16c6658b"
  };
  // ============================================================

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const ref = db.ref('contador');

  const emojis = ['💋','💕','💖','💗','😘','✨','🌸','💝'];
  let connected = false;

  // --- Racha (combo) local ---
  const STREAK_WINDOW_MS = 2400;
  const STREAK_SHOW_FROM = 3;
  let streakCount = 0;
  let streakLastAt = 0;
  let streakHideTimer = null;

  function showStreak(count) {
    const el = document.getElementById('streak');
    if (!el) return;
    el.textContent = `🔥 Racha x${count}`;
    el.classList.toggle('show', count >= STREAK_SHOW_FROM);
    if (streakHideTimer) clearTimeout(streakHideTimer);
    if (count >= STREAK_SHOW_FROM) {
      streakHideTimer = setTimeout(() => {
        el.classList.remove('show');
      }, 1600);
    }
  }

  function bumpStreak() {
    const now = Date.now();
    if (now - streakLastAt <= STREAK_WINDOW_MS) {
      streakCount += 1;
    } else {
      streakCount = 1;
    }
    streakLastAt = now;
    showStreak(streakCount);
  }

  function resetStreak() {
    streakCount = 0;
    streakLastAt = 0;
    const el = document.getElementById('streak');
    if (el) el.classList.remove('show');
  }

  function updateLeaderBar(bubu, dudu) {
    const total = (bubu || 0) + (dudu || 0);
    const pctBubu = total > 0 ? Math.round((bubu / total) * 100) : 50;
    const pctDudu = 100 - pctBubu;

    const left = document.getElementById('leader-left');
    const right = document.getElementById('leader-right');
    const bar = document.getElementById('leader-bar');
    const winner = document.getElementById('leader-winner');

    if (left) left.textContent = `Bubu ${pctBubu}%`;
    if (right) right.textContent = `${pctDudu}% Dudu`;
    if (bar) {
      bar.style.setProperty('--bubuPct', String(pctBubu));
      bar.setAttribute('aria-valuenow', String(pctBubu));
    }
    if (winner) {
      if (total === 0 || bubu === dudu) winner.textContent = 'Empate';
      else if (bubu > dudu) winner.textContent = 'Va ganando Bubu 💗';
      else winner.textContent = 'Va ganando Dudu 💜';
    }
  }

  function setStatus(kind, text, autoHideMs) {
    const bar = document.getElementById('status-bar');
    bar.style.opacity = '1';
    bar.textContent = text;
    bar.className = 'status-bar ' + kind;
    if (autoHideMs) setTimeout(() => (bar.style.opacity = '0'), autoHideMs);
  }

  // --- Botones (click + mantener apretado) ---
  function bindKissControls() {
    const buttons = Array.from(document.querySelectorAll('button[data-who][data-delta]'));
    const activeByEl = new WeakMap();

    function clearTimers(el) {
      const state = activeByEl.get(el);
      if (!state) return;
      if (state.startTimer) clearTimeout(state.startTimer);
      if (state.repeatTimer) clearInterval(state.repeatTimer);
      activeByEl.delete(el);
    }

    function trigger(el) {
      const who = el.getAttribute('data-who');
      const delta = parseInt(el.getAttribute('data-delta') || '0', 10);
      if (!who || !delta) return;
      change(who, delta);
    }

    buttons.forEach(el => {
      el.addEventListener('click', () => {
        if (el.disabled) return;
        trigger(el);
      });

      el.addEventListener('pointerdown', (ev) => {
        if (el.disabled) return;
        if (ev.pointerType === 'mouse' && ev.button !== 0) return;
        clearTimers(el);

        // Evita selección/arrastre raro en mobile
        ev.preventDefault();

        const state = {
          startTimer: null,
          repeatTimer: null,
        };
        activeByEl.set(el, state);

        // Si lo mantenés apretado, arranca a repetir
        state.startTimer = setTimeout(() => {
          if (el.disabled) return;
          trigger(el);
          state.repeatTimer = setInterval(() => {
            if (el.disabled) return;
            trigger(el);
          }, 220);
        }, 420);
      }, { passive: false });

      ['pointerup', 'pointercancel', 'pointerleave', 'lostpointercapture'].forEach(type => {
        el.addEventListener(type, () => clearTimers(el));
      });
    });

    // Atajos: B/D suma, Shift+B/Shift+D quita
    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

      const key = (e.key || '').toLowerCase();
      if (key === 'b') {
        e.preventDefault();
        change('bubu', e.shiftKey ? -1 : 1);
      }
      if (key === 'd') {
        e.preventDefault();
        change('dudu', e.shiftKey ? -1 : 1);
      }
    });
  }

  // --- Estado de conexión ---
  db.ref('.info/connected').on('value', snap => {
    connected = snap.val();
    if (connected) {
      setStatus('connected', '✓ Conectado en tiempo real', 2000);
    } else {
      setStatus('error', '⚠ Sin conexión — reconectando...', 0);
    }
    setButtonsDisabled(!connected);
  }, (err) => {
    console.error('Firebase .info/connected error:', err);
    setStatus('error', `⛔ Firebase: ${err?.code || 'error'}`, 0);
    setButtonsDisabled(true);
  });

  bindKissControls();

  function setButtonsDisabled(disabled) {
    ['plus-bubu','minus-bubu','plus-dudu','minus-dudu'].forEach(id => {
      document.getElementById(id).disabled = disabled;
    });
  }

  // --- Escuchar cambios en Firebase (tiempo real) ---
  ref.on('value', snap => {
    const data = snap.val() || { bubu: 0, dudu: 0, log: [] };
    renderUI(data);
  }, (err) => {
    console.error('Firebase ref.on(value) error:', err);
    setStatus('error', `⛔ Firebase: ${err?.code || 'error'}`, 0);
    setButtonsDisabled(true);
  });

  // --- Dar / quitar beso (transacción atómica) ---
  function change(who, delta) {
    ref.transaction(current => {
      if (!current) current = { bubu: 0, dudu: 0, log: [] };

      const newVal = (current[who] || 0) + delta;
      if (newVal < 0) return; // abortar transacción

      current[who] = newVal;

      const emoji = who === 'bubu' ? '💋' : '💜';
      const name = who === 'bubu' ? 'BUBU' : 'DUDU';
      const action = delta > 0
        ? `${emoji} ${name} dio un beso`
        : `${who === 'bubu' ? '🌸' : '⭐'} ${name} quitó un beso`;

      if (!current.log) current.log = [];
      current.log.unshift({ text: action, who, ts: Date.now() });
      if (current.log.length > 20) current.log = current.log.slice(0, 20);

      return current;
    });

    if (delta > 0) {
      bumpStreak();
      spawnHeart();
      spawnHeart();
    } else {
      resetStreak();
    }
  }

  // --- Reiniciar todo ---
  function resetAll() {
    if (!confirm('¿Reiniciar el contador a cero?')) return;
    ref.set({ bubu: 0, dudu: 0, log: [] });
  }

  // --- Renderizar la UI ---
  function renderUI(data) {
    const bubu = data.bubu || 0;
    const dudu = data.dudu || 0;
    const log  = data.log  || [];
    const total = bubu + dudu;

    updateLeaderBar(bubu, dudu);

    const el = document.getElementById('count');
    const prev = parseInt(el.textContent) || 0;
    el.textContent = total;
    if (total !== prev) {
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 160);
    }

    document.getElementById('bubu-contrib').textContent = bubu + (bubu === 1 ? ' beso' : ' besos');
    document.getElementById('dudu-contrib').textContent = dudu + (dudu === 1 ? ' beso' : ' besos');

    const list = document.getElementById('log-list');
    if (log.length === 0) {
      list.innerHTML = '<p class="log-empty">Aún no hay besos... ¡dense uno!</p>';
    } else {
      list.innerHTML = log.map(e =>
        `<div class="log-item log-${e.who}">${e.text}</div>`
      ).join('');
    }
  }

  // --- Corazones flotantes ---
  function spawnHeart() {
    const container = document.getElementById('fhearts');
    const el = document.createElement('span');
    el.className = 'fh';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left   = (20 + Math.random() * 60) + '%';
    el.style.bottom = '60px';
    el.style.fontSize = (12 + Math.random() * 10) + 'px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }
</script>
</body>
</html>

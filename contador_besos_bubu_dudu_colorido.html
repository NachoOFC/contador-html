
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap {
    min-height: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 2.5rem;
    font-family: var(--font-sans);
    background: linear-gradient(160deg, #fde8f0 0%, #ede8fc 50%, #e8f0fd 100%);
    border-radius: var(--border-radius-lg);
  }
  @media (prefers-color-scheme: dark) {
    .wrap { background: linear-gradient(160deg, #3a1a28 0%, #221a3a 50%, #1a2240 100%); }
  }

  .title-block { text-align: center; margin-bottom: 1.5rem; }
  .title-emoji { font-size: 28px; display: block; margin-bottom: 4px; }
  .title-text {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #b0559a;
    font-weight: 500;
  }
  @media (prefers-color-scheme: dark) { .title-text { color: #e8a0d8; } }

  .counter-card {
    background: #fff;
    border: 2px solid #f4b8d8;
    border-radius: 24px;
    padding: 1.75rem 3rem;
    text-align: center;
    width: 100%;
    max-width: 340px;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  @media (prefers-color-scheme: dark) {
    .counter-card { background: #2a1220; border-color: #8a3060; }
  }
  .counter-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    background: #fde8f4;
    border-radius: 50%;
    z-index: 0;
  }
  .counter-card::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -20px;
    width: 70px; height: 70px;
    background: #eee8fd;
    border-radius: 50%;
    z-index: 0;
  }
  @media (prefers-color-scheme: dark) {
    .counter-card::before { background: #3a1a2e; }
    .counter-card::after { background: #1e1a3a; }
  }
  .counter-inner { position: relative; z-index: 1; }

  .count-number {
    font-size: 88px;
    font-weight: 500;
    line-height: 1;
    background: linear-gradient(135deg, #e8558a, #9b6cdf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    transition: transform 0.15s ease;
    display: block;
  }
  .count-number.bump { transform: scale(1.18); }
  .count-label {
    font-size: 13px;
    color: #c070a0;
    letter-spacing: 0.08em;
  }
  @media (prefers-color-scheme: dark) { .count-label { color: #d090c0; } }

  .players {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 1.25rem;
  }

  .player-card {
    border-radius: 20px;
    padding: 1.25rem 0.85rem;
    text-align: center;
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .player-card.bubu-card {
    background: linear-gradient(135deg, #ffe0ef, #ffc8e4);
    border-color: #f4a0c8;
  }
  .player-card.dudu-card {
    background: linear-gradient(135deg, #e8e0ff, #d4c8ff);
    border-color: #b89cf0;
  }
  @media (prefers-color-scheme: dark) {
    .player-card.bubu-card { background: linear-gradient(135deg, #3a1028, #501838); border-color: #8a3060; }
    .player-card.dudu-card { background: linear-gradient(135deg, #1e1040, #2a1858); border-color: #6040b0; }
  }

  .player-name {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .player-name.bubu { color: #c03070; }
  .player-name.dudu { color: #6030c0; }
  @media (prefers-color-scheme: dark) {
    .player-name.bubu { color: #f090c0; }
    .player-name.dudu { color: #b090f0; }
  }
  .player-contrib {
    font-size: 12px;
    margin-bottom: 14px;
    color: #a06080;
    font-weight: 500;
  }
  @media (prefers-color-scheme: dark) { .player-contrib { color: #c090b0; } }

  .btn-row { display: flex; gap: 8px; justify-content: center; }

  .btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s ease, filter 0.15s;
    font-size: 20px;
    font-weight: 500;
    line-height: 1;
  }
  .btn:active { transform: scale(0.88); }
  .btn:hover { filter: brightness(1.08); }

  .btn-kiss-bubu {
    background: linear-gradient(135deg, #f06090, #e03070);
    color: #fff;
    box-shadow: 0 3px 10px #f0609040;
  }
  .btn-minus-bubu {
    background: #ffd8ec;
    color: #c03070;
  }
  @media (prefers-color-scheme: dark) {
    .btn-minus-bubu { background: #501030; color: #f080c0; }
  }

  .btn-kiss-dudu {
    background: linear-gradient(135deg, #9060e0, #6030c0);
    color: #fff;
    box-shadow: 0 3px 10px #9060e040;
  }
  .btn-minus-dudu {
    background: #ddd0ff;
    color: #6030c0;
  }
  @media (prefers-color-scheme: dark) {
    .btn-minus-dudu { background: #28104a; color: #c090f0; }
  }

  .log {
    width: 100%;
    max-width: 340px;
    background: #fff8fc;
    border: 1.5px solid #f0c8e0;
    border-radius: 16px;
    padding: 0.9rem 1rem;
    max-height: 130px;
    overflow-y: auto;
  }
  @media (prefers-color-scheme: dark) {
    .log { background: #1e0e18; border-color: #6a2848; }
  }
  .log-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #c070a0;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .log-item {
    font-size: 12px;
    padding: 3px 0;
    border-bottom: 0.5px solid #f4d0e8;
    display: flex; align-items: center; gap: 6px;
  }
  @media (prefers-color-scheme: dark) {
    .log-item { border-color: #4a1e38; }
  }
  .log-item:last-child { border-bottom: none; }
  .log-item.log-bubu { color: #c03070; }
  .log-item.log-dudu { color: #6030c0; }
  @media (prefers-color-scheme: dark) {
    .log-item.log-bubu { color: #f090c0; }
    .log-item.log-dudu { color: #b090f0; }
  }
  .log-empty { font-size: 12px; color: #c090b0; font-style: italic; text-align: center; }

  .floating-hearts {
    position: absolute;
    pointer-events: none;
    top: 0; left: 0; width: 100%; height: 100%;
    overflow: hidden;
    border-radius: var(--border-radius-lg);
  }
  .fh {
    position: absolute;
    font-size: 14px;
    opacity: 0;
    animation: floatup 1.2s ease-out forwards;
  }
  @keyframes floatup {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }
</style>

<div class="wrap" id="wrap" style="position:relative;">
  <div class="floating-hearts" id="fhearts"></div>

  <div class="title-block">
    <span class="title-emoji">💕</span>
    <span class="title-text">Contador de besos</span>
  </div>

  <div class="counter-card">
    <div class="counter-inner">
      <span class="count-number" id="count">0</span>
      <div class="count-label">besitos totales</div>
    </div>
  </div>

  <div class="players">
    <div class="player-card bubu-card">
      <div class="player-name bubu">BUBU</div>
      <div class="player-contrib" id="bubu-contrib">0 besos</div>
      <div class="btn-row">
        <button class="btn btn-minus-bubu" onclick="change('bubu', -1)" title="quitar">−</button>
        <button class="btn btn-kiss-bubu" onclick="change('bubu', 1)" title="dar beso">
          <svg width="20" height="18" viewBox="0 0 20 18" fill="none"><path d="M10 17C10 17 1 10.5 1 5C1 2.8 2.9 1 5.5 1C7.5 1 9 2.2 10 3.6C11 2.2 12.5 1 14.5 1C17.1 1 19 2.8 19 5C19 10.5 10 17 10 17Z" fill="white"/></svg>
        </button>
      </div>
    </div>

    <div class="player-card dudu-card">
      <div class="player-name dudu">DUDU</div>
      <div class="player-contrib" id="dudu-contrib">0 besos</div>
      <div class="btn-row">
        <button class="btn btn-minus-dudu" onclick="change('dudu', -1)" title="quitar">−</button>
        <button class="btn btn-kiss-dudu" onclick="change('dudu', 1)" title="dar beso">
          <svg width="20" height="18" viewBox="0 0 20 18" fill="none"><path d="M10 17C10 17 1 10.5 1 5C1 2.8 2.9 1 5.5 1C7.5 1 9 2.2 10 3.6C11 2.2 12.5 1 14.5 1C17.1 1 19 2.8 19 5C19 10.5 10 17 10 17Z" fill="white"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="log">
    <div class="log-title">Historial de besitos</div>
    <div id="log-list"><p class="log-empty">Aún no hay besos... ¡dense uno!</p></div>
  </div>
</div>

<script>
  const state = { bubu: 0, dudu: 0, log: [] };
  const emojis = ['💋','💕','💖','💗','😘','✨','🌸','💝'];

  function spawnHeart(who) {
    const container = document.getElementById('fhearts');
    const el = document.createElement('span');
    el.className = 'fh';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (20 + Math.random() * 60) + '%';
    el.style.bottom = '60px';
    el.style.fontSize = (12 + Math.random() * 10) + 'px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }

  function change(who, delta) {
    const newVal = state[who] + delta;
    if (newVal < 0) return;
    state[who] = newVal;

    const emoji = who === 'bubu' ? '💋' : '💜';
    const name = who === 'bubu' ? 'BUBU' : 'DUDU';
    const action = delta > 0
      ? `${emoji} ${name} dio un beso`
      : `${who === 'bubu' ? '🌸' : '⭐'} ${name} quitó un beso`;

    if (delta > 0) { spawnHeart(who); spawnHeart(who); }
    state.log.unshift({ text: action, who });
    if (state.log.length > 20) state.log.pop();
    render();
  }

  function render() {
    const total = state.bubu + state.dudu;
    const el = document.getElementById('count');
    el.textContent = total;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 160);

    document.getElementById('bubu-contrib').textContent = state.bubu + (state.bubu === 1 ? ' beso' : ' besos');
    document.getElementById('dudu-contrib').textContent = state.dudu + (state.dudu === 1 ? ' beso' : ' besos');

    const list = document.getElementById('log-list');
    if (state.log.length === 0) {
      list.innerHTML = '<p class="log-empty">Aún no hay besos... ¡dense uno!</p>';
    } else {
      list.innerHTML = state.log.map(e =>
        `<div class="log-item log-${e.who}">${e.text}</div>`
      ).join('');
    }
  }
</script>
